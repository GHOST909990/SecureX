<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureX</title>
    <link rel="shortcut icon" href="/img/icon.png" type="image/x-icon">
    <link rel="manifest" href="/manifest.json">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .generator-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 0.8s ease-out;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .password-display {
            background: #f7f9fc;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            position: relative;
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .password-display:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
            }
        }

        #password {
            width: 100%;
            font-size: 20px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #333;
            background: transparent;
            border: none;
            outline: none;
            text-align: center;
            letter-spacing: 2px;
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .password-display:hover .copy-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .copy-btn:hover {
            background: #5a67d8;
            transform: translateY(-50%) scale(1.05);
        }

        .copy-btn.copied {
            background: #48bb78;
        }

        .settings {
            background: #f7f9fc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .setting-item {
            margin-bottom: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .setting-item:last-child {
            margin-bottom: 0;
        }

        .setting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .setting-header label {
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .setting-header span {
            color: #667eea;
            font-weight: 600;
            font-size: 16px;
        }

        /* Стилизация слайдера */
        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
            cursor: pointer;
            transition: transform 0.2s ease;
            border: 2px solid #667eea;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Стилизация чекбоксов */
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            animation: fadeIn 1s ease-out;
        }

        .checkbox-item input[type="checkbox"] {
            display: none;
        }

        .checkbox-custom {
            width: 22px;
            height: 22px;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            margin-right: 10px;
            position: relative;
            transition: all 0.3s ease;
        }

        .checkbox-item input[type="checkbox"]:checked+.checkbox-custom {
            background: #667eea;
            border-color: #667eea;
        }

        .checkbox-item input[type="checkbox"]:checked+.checkbox-custom::after {
            content: '\2714';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
        }

        .checkbox-item:hover .checkbox-custom {
            border-color: #667eea;
            transform: scale(1.05);
        }

        .checkbox-label {
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        /* Кнопки действий */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #f0f4ff;
            transform: translateY(-2px);
        }

        /* Индикатор надежности */
        .strength-meter {
            background: #f7f9fc;
            border-radius: 12px;
            padding: 15px;
            animation: slideUp 0.8s ease-out;
        }

        .strength-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .strength-bar {
            height: 8px;
            background: #e1e8ed;
            border-radius: 4px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: all 0.5s ease;
        }

        .strength-fill.weak {
            background: #f56565;
            width: 33.33%;
        }

        .strength-fill.medium {
            background: #fbbf24;
            width: 66.66%;
        }

        .strength-fill.strong {
            background: #48bb78;
            width: 100%;
        }

        /* Уведомление */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .notification.success {
            background: #48bb78;
        }

        .notification.error {
            background: #f56565;
        }

        /* Анимация для кнопок при клике */
        .btn:active {
            transform: scale(0.95);
        }

        /* Дополнительные анимации */
        .pulse-animation {
            animation: pulseButton 2s infinite;
        }

        @keyframes pulseButton {
            0% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="generator-card">
            <h1>🔐 SecureX - Генератор паролей</h1>
            <p class="subtitle">Создайте надежный пароль за один клик</p>

            <div class="password-display">
                <input type="text" id="password" readonly value="P@ssw0rd123">
                <button class="copy-btn" id="copyBtn" onclick="copyPassword()">
                    <span>Копировать</span>
                </button>
            </div>

            <div class="settings">
                <div class="setting-item">
                    <div class="setting-header">
                        <label>Длина пароля</label>
                        <span id="lengthValue">12</span>
                    </div>
                    <input type="range" id="length" class="slider" min="6" max="30" value="12"
                        oninput="updateLengthValue()">
                </div>

                <div class="setting-item">
                    <label>Параметры пароля</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="uppercase" checked>
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-label">A-Z (заглавные)</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="lowercase" checked>
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-label">a-z (строчные)</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="numbers" checked>
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-label">0-9 (цифры)</span>
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="symbols" checked>
                            <span class="checkbox-custom"></span>
                            <span class="checkbox-label">!@#$% (символы)</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" id="generateBtn" onclick="generatePassword()">
                    🔄 Сгенерировать
                </button>
                <button class="btn btn-secondary" id="resetBtn" onclick="resetSettings()">
                    ⚡ Сбросить
                </button>
            </div>

            <div class="strength-meter">
                <div class="strength-label">
                    <span>Надежность пароля</span>
                    <span id="strengthText">Средний</span>
                </div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification">Пароль скопирован!</div>

    <script>
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(registration => {
                console.log('Service Worker зарегистрирован:', registration);
              })
              .catch(error => {
                console.error('Ошибка регистрации Service Worker:', error);
              });
          });
        }

        
        // Элементы DOM
        const passwordInput = document.getElementById('password');
        const lengthSlider = document.getElementById('length');
        const lengthValue = document.getElementById('lengthValue');
        const uppercaseCheck = document.getElementById('uppercase');
        const lowercaseCheck = document.getElementById('lowercase');
        const numbersCheck = document.getElementById('numbers');
        const symbolsCheck = document.getElementById('symbols');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const notification = document.getElementById('notification');
        const copyBtn = document.getElementById('copyBtn');

        // Наборы символов
        const charSets = {
            uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            lowercase: 'abcdefghijklmnopqrstuvwxyz',
            numbers: '0123456789',
            symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
        };

        // Функция обновления отображения длины
        function updateLengthValue() {
            lengthValue.textContent = lengthSlider.value;
            generatePassword(); // Генерируем пароль при изменении длины
        }

        // Функция генерации пароля
        function generatePassword() {
            // Проверяем, что выбран хотя бы один тип символов
            if (!uppercaseCheck.checked && !lowercaseCheck.checked &&
                !numbersCheck.checked && !symbolsCheck.checked) {
                showNotification('Выберите хотя бы один тип символов!', 'error');
                return;
            }

            const length = parseInt(lengthSlider.value);

            // Собираем доступные символы
            let availableChars = '';
            if (uppercaseCheck.checked) availableChars += charSets.uppercase;
            if (lowercaseCheck.checked) availableChars += charSets.lowercase;
            if (numbersCheck.checked) availableChars += charSets.numbers;
            if (symbolsCheck.checked) availableChars += charSets.symbols;

            // Генерируем пароль
            let password = '';
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * availableChars.length);
                password += availableChars[randomIndex];
            }

            // Добавляем анимацию при генерации
            passwordInput.style.transform = 'scale(1.05)';
            setTimeout(() => {
                passwordInput.style.transform = 'scale(1)';
            }, 200);

            passwordInput.value = password;
            updateStrengthMeter(password);

            // Анимация для кнопки генерации
            const generateBtn = document.getElementById('generateBtn');
            generateBtn.classList.add('pulse-animation');
            setTimeout(() => {
                generateBtn.classList.remove('pulse-animation');
            }, 300);
        }

        // Функция обновления индикатора надежности
        function updateStrengthMeter(password) {
            let score = 0;

            // Оценка длины
            if (password.length >= 12) score += 2;
            else if (password.length >= 8) score += 1;

            // Оценка разнообразия символов
            if (/[A-Z]/.test(password)) score += 1;
            if (/[a-z]/.test(password)) score += 1;
            if (/[0-9]/.test(password)) score += 1;
            if (/[^A-Za-z0-9]/.test(password)) score += 2;

            // Проверка на повторяющиеся символы
            if (/(.)\1{2,}/.test(password)) score -= 1;

            // Обновление отображения
            strengthFill.className = 'strength-fill';
            if (score <= 3) {
                strengthFill.classList.add('weak');
                strengthText.textContent = 'Слабый';
            } else if (score <= 5) {
                strengthFill.classList.add('medium');
                strengthText.textContent = 'Средний';
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = 'Надежный';
            }
        }

        // Функция копирования пароля
        async function copyPassword() {
            if (!passwordInput.value) {
                showNotification('Нет пароля для копирования!', 'error');
                return;
            }

            try {
                await navigator.clipboard.writeText(passwordInput.value);

                // Анимация кнопки копирования
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = '<span>✓ Скопировано</span>';

                showNotification('Пароль скопирован в буфер обмена!', 'success');

                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = '<span>Копировать</span>';
                }, 2000);
            } catch (err) {
                showNotification('Ошибка при копировании!', 'error');
            }
        }

        // Функция сброса настроек
        function resetSettings() {
            // Анимация сброса
            const resetBtn = document.getElementById('resetBtn');
            resetBtn.style.transform = 'rotate(180deg)';

            lengthSlider.value = 12;
            updateLengthValue();
            uppercaseCheck.checked = true;
            lowercaseCheck.checked = true;
            numbersCheck.checked = true;
            symbolsCheck.checked = true;

            generatePassword();

            setTimeout(() => {
                resetBtn.style.transform = 'rotate(0deg)';
            }, 300);

            showNotification('Настройки сброшены!', 'success');
        }

        // Функция показа уведомлений
        function showNotification(message, type = 'success') {
            notification.textContent = message;
            notification.className = `notification show ${type}`;

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Добавляем эффекты при наведении на символы
        document.querySelectorAll('.checkbox-item').forEach(item => {
            item.addEventListener('mouseenter', () => {
                item.style.transform = 'translateX(5px)';
            });

            item.addEventListener('mouseleave', () => {
                item.style.transform = 'translateX(0)';
            });
        });

        // Генерируем пароль при загрузке страницы
        window.addEventListener('load', () => {
            generatePassword();

            // Добавляем небольшую задержку для анимации появления
            setTimeout(() => {
                document.querySelector('.generator-card').style.opacity = '1';
            }, 100);
        });

        // Добавляем эффект пульсации для слайдера при изменении
        lengthSlider.addEventListener('input', () => {
            lengthSlider.style.transform = 'scale(1.02)';
            setTimeout(() => {
                lengthSlider.style.transform = 'scale(1)';
            }, 100);
        });

        // Функция для создания случайного пароля при нажатии Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generatePassword();
            }
        });
    </script>
</body>

</html>
